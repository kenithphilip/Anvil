name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - run: npm run build
      - run: npm run verify
      - run: test -f public/index.html
      - run: npm test -- --run
