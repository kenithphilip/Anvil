<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<!-- no-referrer prevents the access_token in the URL fragment from
     leaking via the Referer header to any third-party origin a
     subsequent link on this page might point to. -->
<meta name="referrer" content="no-referrer"/>
<!-- This page handles single-use auth callbacks. Aggressive cache
     suppression prevents the URL (with token in the fragment) from
     being served from disk cache on a back-button. -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, private"/>
<meta http-equiv="Pragma" content="no-cache"/>
<title>Anvil sign-in callback</title>
<style>
  body { font-family: Inter, system-ui, sans-serif; background: #fafaf9; color: #1c1917; padding: 32px; max-width: 520px; margin: 6vh auto; }
  h1 { font-size: 20px; margin-bottom: 12px; }
  .ok { color: #15803d; }
  .err { color: #b91c1c; }
  pre { background: #f5f5f4; padding: 12px; border-radius: 8px; font-size: 12px; overflow: auto; }
  button { background: #9a3412; color: #fff; border: 0; border-radius: 8px; padding: 9px 16px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<h1 id="title">Finishing sign-in...</h1>
<p id="message">Reading the magic link parameters from the URL.</p>
<pre id="detail" style="display:none"></pre>
<p>
  <button id="back" style="display:none">Back to Anvil</button>
</p>
<!--
  Hardened May 2026 (audit follow-up): the bootstrap was moved out
  of an inline <script> block to /auth/callback.js so the CSP can
  drop `script-src 'unsafe-inline'`. Same behaviour, sourced from a
  same-origin file.
-->
<script src="/auth/callback.js"></script>
</body>
</html>
