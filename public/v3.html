<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Anvil v3 · Operator console</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0E0F11" />
<meta name="description" content="Anvil — sales-ops execution layer for Obara India." />

<!-- Skip-link for keyboard users (WCAG 2.4.1) -->
<style>
  .skip-link {
    position: absolute; left: -9999px; top: 0;
    background: var(--ink); color: var(--paper);
    padding: 8px 12px; z-index: 1000; font-size: 12px;
  }
  .skip-link:focus { left: 8px; top: 8px; }
</style>

<!-- v3 design tokens + components (inlined by build) -->
<style id="v3-styles">/* ==========================================================================
   ANVIL v3 — Operator Console
   --------------------------------------------------------------------------
   Industrial sales-ops application. Refined for 8-hour operator workdays:
   quiet density, loud anomalies, monospace numerals, chartreuse for "live".
   ==========================================================================
*/

@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500&display=swap");

:root {
  /* ── Type ──────────────────────────────────────────────── */
  --sans: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, Menlo, monospace;
  --serif: "IBM Plex Serif", Georgia, serif;

  /* ── Surface (light · operator console) ────────────────── */
  --bg:        #F4F4F0;       /* desk background */
  --paper:     #FBFBF8;       /* primary surfaces */
  --paper-2:   #F4F4F0;       /* secondary surfaces, raised cells */
  --paper-3:   #ECECE6;       /* deep wells, code blocks */
  --paper-4:   #E2E2DA;       /* selected rows */

  /* ── Ink ───────────────────────────────────────────────── */
  --ink:       #15171A;       /* primary text, strong dividers */
  --ink-2:     #2D3035;       /* secondary text */
  --ink-3:     #5C6068;       /* tertiary, supporting copy */
  --ink-4:     #8A8E96;       /* metadata */
  --ink-5:     #B6B9BF;       /* placeholders, disabled */

  /* ── Hairlines ─────────────────────────────────────────── */
  --hairline:   #D8D8D0;
  --hairline-2: #E5E5DD;
  --hairline-3: #EFEFE9;

  /* ── Brand · electric chartreuse, used sparingly ───────── */
  --accent:    #C8FF2B;        /* live/active fill */
  --accent-2: #6BBA00;          /* live/active stroke + small text */
  --accent-3: #F1FFC2;          /* live wash background */

  /* ── Semantic ──────────────────────────────────────────── */
  --sage:      #355E3B;        /* good · positive */
  --sage-2:    #1F3A24;
  --sage-3:    #DCE8DD;
  --amber:     #B57810;        /* warn · caution */
  --amber-2:   #6F4805;
  --amber-3:   #F4E4C0;
  --rust:      #A23A1F;        /* bad · blocked */
  --rust-2:    #6E2613;
  --rust-3:    #F1D2C7;
  --lapis:     #1F4FA0;        /* info · cool */
  --lapis-2:   #112D5E;
  --lapis-3:   #D6E2F4;
  --plum:      #4A2D5C;        /* admin · governance */
  --plum-3:    #E1D6E8;

  /* ── Geometry ──────────────────────────────────────────── */
  --r-1: 2px;
  --r-2: 4px;
  --r-3: 6px;
  --r-4: 8px;

  /* ── Elevation (very subtle in light mode) ─────────────── */
  --shadow-1: 0 1px 0 rgba(21,23,26,0.04);
  --shadow-2: 0 1px 0 rgba(21,23,26,0.06), 0 6px 14px -8px rgba(21,23,26,0.10);

  /* ── Spacing scale ─────────────────────────────────────── */
  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-7: 32px; --s-8: 48px;

  /* ── Density ──────────────────────────────────────────── */
  --row-h: 32px;
  --pad-y: 6px;
  --pad-x: 10px;

  /* ── Z ────────────────────────────────────────────────── */
  --z-rail: 50;
  --z-dock: 60;
  --z-overlay: 70;
  --z-cmdk: 80;
}

[data-density="compact"] {
  --row-h: 26px;
  --pad-y: 4px;
  --pad-x: 8px;
}
[data-density="comfortable"] {
  --row-h: 36px;
  --pad-y: 8px;
  --pad-x: 12px;
}

[data-theme="dark"] {
  --bg:        #0E0F11;
  --paper:     #16181B;
  --paper-2:   #1B1E22;
  --paper-3:   #21252A;
  --paper-4:   #2A2F36;

  --ink:       #ECECE6;
  --ink-2:     #C9CBD0;
  --ink-3:     #95989F;
  --ink-4:     #6A6E76;
  --ink-5:     #4A4E55;

  --hairline:   #2D3138;
  --hairline-2: #25292F;
  --hairline-3: #1E2126;

  --accent:    #C8FF2B;
  --accent-2:  #B4F500;
  --accent-3:  #2A3914;

  --sage:      #6FBF7E;
  --sage-2:    #88D396;
  --sage-3:    #1F3625;
  --amber:     #E2A442;
  --amber-2:   #F2BD63;
  --amber-3:   #3A2C0E;
  --rust:      #E27A55;
  --rust-2:    #F09877;
  --rust-3:    #3E1E14;
  --lapis:     #6F95DD;
  --lapis-2:   #8DAFF0;
  --lapis-3:   #1B2A4A;
  --plum:      #B496CF;
  --plum-3:    #2C1F38;

  --shadow-1: 0 1px 0 rgba(0,0,0,0.4);
  --shadow-2: 0 2px 0 rgba(0,0,0,0.5), 0 8px 22px -10px rgba(0,0,0,0.6);
}

/* ── Reset ───────────────────────────────────────────────── */
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11", "tnum" 1, "lnum" 1;
}

button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; }

/* numerals are tabular by default */
.num, .mono, .mono-sm { font-variant-numeric: tabular-nums; }

/* ============================================================
   APPLICATION SHELL
   ============================================================ */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  grid-template-rows: 44px 1fr 28px;
  grid-template-areas:
    "head head"
    "side main"
    "side dock";
  height: 100vh;
  width: 100%;
  background: var(--bg);
}
[data-rail="collapsed"] .app { grid-template-columns: 56px 1fr; }
[data-rail="collapsed"] .nav-label { display: none; }
[data-rail="collapsed"] .nav-section-label { display: none; }
[data-rail="collapsed"] .nav-item { justify-content: center; padding: 0 14px; }
[data-rail="collapsed"] .brand .name { display: none; }

.app-head {
  grid-area: head;
  display: flex; align-items: center;
  background: var(--paper);
  border-bottom: 1px solid var(--hairline);
  padding: 0 var(--s-4);
  gap: var(--s-3);
  position: relative;
  z-index: 5;
}
.app-side {
  grid-area: side;
  background: var(--paper);
  border-right: 1px solid var(--hairline);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.app-main {
  grid-area: main;
  overflow: auto;
  position: relative;
  background: var(--bg);
}
.app-dock {
  grid-area: dock;
  display: flex; align-items: center;
  background: var(--paper);
  border-top: 1px solid var(--hairline);
  padding: 0 var(--s-3);
  gap: var(--s-3);
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
}

/* ── Header ─────────────────────────────────────────────── */
.brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--sans);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: -0.01em;
  width: 232px;
  padding-right: var(--s-4);
  border-right: 1px solid var(--hairline);
  height: 100%;
  margin-left: -16px;
  padding-left: 16px;
}
.brand-mark {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  background: var(--ink); color: var(--paper);
  font-family: var(--mono);
  font-weight: 700;
  letter-spacing: -0.05em;
  font-size: 12px;
}
.brand-mark svg { width: 14px; height: 14px; }
[data-rail="collapsed"] .brand { width: 56px; }

.crumb {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-3);
  white-space: nowrap;
}
.crumb b { color: var(--ink); font-weight: 600; }
.crumb-sep { color: var(--ink-5); }

.head-search {
  flex: 1;
  max-width: 480px;
  display: flex; align-items: center; gap: 6px;
  height: 28px;
  padding: 0 10px;
  background: var(--paper-2);
  border: 1px solid var(--hairline);
  border-radius: var(--r-2);
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--ink-3);
  cursor: text;
  margin-left: auto;
}
.head-search kbd {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 5px;
  border: 1px solid var(--hairline);
  border-radius: 2px;
  background: var(--paper);
  color: var(--ink-3);
  margin-left: auto;
}

.head-pill {
  display: inline-flex; align-items: center; gap: 6px;
  height: 26px;
  padding: 0 10px;
  background: var(--paper-2);
  border: 1px solid var(--hairline);
  border-radius: var(--r-2);
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-2);
  cursor: pointer;
  white-space: nowrap;
}
.head-pill:hover { background: var(--paper-3); }
.head-pill .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent-2); }
.head-pill.role { font-weight: 600; }
.head-pill.tenant { font-weight: 600; }

/* ── Sidebar ────────────────────────────────────────────── */
.nav {
  flex: 1;
  overflow: auto;
  padding: 8px 0;
}
.nav-section {
  padding: 12px 0 4px;
}
.nav-section-label {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-4);
  padding: 0 16px 4px;
  font-weight: 600;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  height: 28px;
  padding: 0 14px;
  font-size: 12.5px;
  color: var(--ink-2);
  cursor: pointer;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-item:hover { background: var(--paper-2); color: var(--ink); }
.nav-item.active {
  background: var(--paper-2);
  color: var(--ink);
  border-left-color: var(--ink);
  font-weight: 600;
}
.nav-icon {
  width: 14px; height: 14px;
  display: grid; place-items: center;
  color: var(--ink-3);
  flex-shrink: 0;
}
.nav-item:hover .nav-icon, .nav-item.active .nav-icon { color: var(--ink); }
.nav-badge {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-3);
  padding: 0 5px;
  height: 16px;
  display: grid; place-items: center;
  background: var(--paper-3);
  border-radius: 2px;
}
.nav-badge.live { background: var(--accent); color: var(--ink); font-weight: 600; }
.nav-badge.warn { background: var(--amber-3); color: var(--amber-2); }
.nav-badge.bad  { background: var(--rust-3); color: var(--rust-2); }

/* ── Footer of sidebar ─────────────────────────────────── */
.side-foot {
  border-top: 1px solid var(--hairline);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
}
.side-foot .av {
  width: 22px; height: 22px;
  background: var(--paper-3);
  display: grid; place-items: center;
  font-size: 10px; font-weight: 600;
  color: var(--ink-2);
  border-radius: 2px;
}

/* ── Workspace ─────────────────────────────────────────── */
.ws {
  display: grid;
  grid-template-columns: 1fr 320px;
  grid-template-rows: auto 1fr;
  grid-template-areas:
    "title title"
    "content rail";
  min-height: 100%;
  gap: 0;
}
.ws-no-rail {
  display: flex;
  flex-direction: column;
}
.ws-title {
  grid-area: title;
  display: flex; align-items: center; gap: 12px;
  padding: 14px 22px 12px;
  border-bottom: 1px solid var(--hairline);
  background: var(--paper);
}
.ws-title h1 {
  margin: 0;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.ws-title .h-meta {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
}
.ws-content {
  grid-area: content;
  padding: 18px 22px;
  display: flex; flex-direction: column;
  gap: 14px;
  min-width: 0;
}
.ws-rail {
  grid-area: rail;
  border-left: 1px solid var(--hairline);
  background: var(--paper);
  display: flex; flex-direction: column;
  overflow: auto;
}
.ws-rail-h {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-4);
  padding: 14px 16px 4px;
  font-weight: 600;
}

/* Tabs row under title */
.ws-tabs {
  display: flex; align-items: center; gap: 0;
  padding: 0 22px;
  border-bottom: 1px solid var(--hairline);
  background: var(--paper);
  height: 36px;
  flex-shrink: 0;
}
.ws-tab {
  padding: 0 14px;
  height: 100%;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--sans);
  font-size: 12.5px;
  color: var(--ink-3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  font-weight: 500;
}
.ws-tab:hover { color: var(--ink); }
.ws-tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }
.ws-tab .tab-count {
  font-family: var(--mono);
  font-size: 10px;
  padding: 0 5px; height: 16px;
  display: grid; place-items: center;
  background: var(--paper-3); color: var(--ink-3);
  border-radius: 2px;
}
.ws-tab.active .tab-count { background: var(--accent); color: var(--ink); }

/* ============================================================
   PRIMITIVES
   ============================================================ */

/* ── Card ──────────────────────────────────────────────── */
.card {
  background: var(--paper);
  border: 1px solid var(--hairline);
  border-radius: var(--r-3);
  padding: 14px 16px;
  display: flex; flex-direction: column;
}
.card.flush { padding: 0; }
.card-h {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--hairline-2);
}
.card-h .t { font-size: 13.5px; font-weight: 600; letter-spacing: -0.005em; }
.card-h .eb { font-family: var(--mono); font-size: 10px; color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.06em; }
.card-h .right { margin-left: auto; }

/* ── Buttons ──────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px;
  padding: 0 12px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--hairline);
  background: var(--paper);
  color: var(--ink);
  border-radius: var(--r-2);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.08s, border 0.08s;
}
.btn:hover { background: var(--paper-2); border-color: var(--ink-4); }
.btn.sm { height: 24px; padding: 0 10px; font-size: 11px; gap: 5px; }
.btn.lg { height: 36px; padding: 0 16px; font-size: 13px; }
.btn.primary {
  background: var(--ink); color: var(--paper);
  border-color: var(--ink);
}
.btn.primary:hover { background: var(--ink-2); border-color: var(--ink-2); }
.btn.live {
  background: var(--accent); color: var(--ink);
  border-color: var(--accent-2);
  font-weight: 600;
}
.btn.live:hover { background: var(--accent-2); color: var(--paper); border-color: var(--accent-2); }
.btn.danger {
  background: var(--rust); color: var(--paper);
  border-color: var(--rust-2);
}
.btn.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--ink-2);
}
.btn.ghost:hover { background: var(--paper-2); color: var(--ink); border-color: var(--hairline); }
.btn.icon { width: 28px; padding: 0; justify-content: center; }
.btn.icon.sm { width: 24px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn .arrow { display: inline-block; transition: transform 0.1s; }
.btn:hover .arrow { transform: translateX(2px); }

/* ── Form ──────────────────────────────────────────────── */
.input, .select, textarea.input {
  display: block;
  width: 100%;
  height: 30px;
  padding: 0 10px;
  background: var(--paper);
  border: 1px solid var(--hairline);
  border-radius: var(--r-2);
  font-family: var(--sans);
  font-size: 12.5px;
  color: var(--ink);
  outline: none;
}
textarea.input { height: auto; padding: 8px 10px; line-height: 1.5; resize: vertical; }
.input:focus, .select:focus, textarea.input:focus {
  border-color: var(--ink);
  box-shadow: 0 0 0 3px var(--paper-4);
}
.input.mono { font-family: var(--mono); font-size: 12px; }
.input::placeholder { color: var(--ink-5); }
.label {
  display: block;
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-4);
  margin-bottom: 5px;
}
.fieldnote { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); margin-top: 5px; line-height: 1.5; }

/* ── Chip / Status ─────────────────────────────────────── */
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  height: 20px;
  padding: 0 7px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: lowercase;
  letter-spacing: 0;
  border: 1px solid var(--hairline);
  background: var(--paper);
  color: var(--ink-2);
  border-radius: 2px;
  white-space: nowrap;
}
.chip.live  { background: var(--accent);    color: var(--ink); border-color: var(--accent-2); font-weight: 600; }
.chip.good  { background: var(--sage-3);    color: var(--sage-2); border-color: transparent; }
.chip.warn  { background: var(--amber-3);   color: var(--amber-2); border-color: transparent; }
.chip.bad   { background: var(--rust-3);    color: var(--rust-2); border-color: transparent; }
.chip.info  { background: var(--lapis-3);   color: var(--lapis-2); border-color: transparent; }
.chip.plum  { background: var(--plum-3);    color: var(--plum); border-color: transparent; }
.chip.fill  { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.chip.ghost { background: transparent; color: var(--ink-3); border-color: var(--hairline); }
.chip.lg    { height: 24px; padding: 0 9px; font-size: 11px; }
.chip .dot  { width: 5px; height: 5px; border-radius: 999px; background: currentColor; }

/* ── KV list ───────────────────────────────────────────── */
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 5px 14px;
  font-family: var(--mono);
  font-size: 11px;
  margin: 0;
}
.kv dt { color: var(--ink-3); font-weight: 400; }
.kv dd { color: var(--ink); margin: 0; font-weight: 500; }

/* ── Tables ────────────────────────────────────────────── */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--sans);
  font-size: 12px;
}
.tbl thead th {
  text-align: left;
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-4);
  border-bottom: 1px solid var(--hairline);
  background: var(--paper-2);
  white-space: nowrap;
}
.tbl tbody td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--hairline-2);
  color: var(--ink-2);
  vertical-align: middle;
}
.tbl tbody tr:hover td { background: var(--paper-2); }
.tbl tbody tr.sel td { background: var(--paper-4); }
.tbl tbody tr.row-flag td { background: rgba(162,58,31,0.06); }
.tbl tbody tr.row-warn td { background: rgba(181,120,16,0.05); }
.tbl tbody tr.row-live td { background: rgba(200,255,43,0.08); }
.tbl td .pri { color: var(--ink); font-weight: 600; }
.tbl .num   { font-family: var(--mono); font-size: 11.5px; }
.tbl td.r, .tbl th.r { text-align: right; }

/* ── Section heading ──────────────────────────────────── */
.h-eyebrow {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-4);
}
.h-display {
  font-family: var(--sans);
  font-weight: 600;
  letter-spacing: -0.02em;
  font-size: 28px;
  line-height: 1.1;
  color: var(--ink);

    window.dispatchEvent(new CustomEvent("rbac:change", { detail: { role } }));
  };

  const cell = (navId) => {
    const row = MATRIX[navId];
    if (!row) return "";
    return row[getRole()] || "";
  };

  const RBAC = {
    ROLES,
    role: getRole,
    setRole,
    canRead: (navId) => /[rwax]/.test(cell(navId)),
    canWrite: (navId) => /[wa]/.test(cell(navId)),
    canApprove: (navId) => /[a]/.test(cell(navId)),
    isAdmin: () => /[x]/.test(cell("admin")) || /[x]/.test(cell("security")),
    canDo: (action) => {
      const allow = ACTIONS[action];
      if (!allow) return true; // unknown action: don't gate (server will catch)
      const r = getRole();
      return allow.includes(r) || r === "admin";
    },
    // For the sidebar: filter NAV groups to only entries the user can read.
    filterNav: (NAV) => NAV.map((g) => ({
      ...g,
      items: g.items.filter((it) => RBAC.canRead(it.id)),
    })).filter((g) => g.items.length > 0),
  };

  if (typeof window !== "undefined") window.RBAC = RBAC;
})();
</script>
<script>// Anvil v3 — UI preferences (theme + density + rail) with persistence.
// Preferences are stored in localStorage and reflected as data-* attributes
// on <html> so the CSS in styles.css responds without a re-render.

(function () {
  const KEY_THEME = "obara:v3_theme";
  const KEY_DENSITY = "obara:v3_density";
  const KEY_RAIL = "obara:v3_rail";

  const ls = {
    get: (k, dflt) => { try { return localStorage.getItem(k) || dflt; } catch { return dflt; } },
    set: (k, v) => { try { localStorage.setItem(k, v); } catch (_) {} },
  };

  // Defaults: dark theme, normal density, expanded rail.
  // The user requested dark default; toggle still available.
  const apply = () => {
    const html = document.documentElement;
    html.setAttribute("data-theme", ls.get(KEY_THEME, "dark"));
    html.setAttribute("data-density", ls.get(KEY_DENSITY, "normal"));
    html.setAttribute("data-rail", ls.get(KEY_RAIL, "expanded"));
  };

  const Prefs = {
    theme: () => ls.get(KEY_THEME, "dark"),
    setTheme: (v) => { ls.set(KEY_THEME, v); apply(); window.dispatchEvent(new CustomEvent("prefs:change", { detail: { theme: v } })); },
    toggleTheme: () => Prefs.setTheme(Prefs.theme() === "dark" ? "light" : "dark"),

    density: () => ls.get(KEY_DENSITY, "normal"),
    setDensity: (v) => { ls.set(KEY_DENSITY, v); apply(); window.dispatchEvent(new CustomEvent("prefs:change", { detail: { density: v } })); },

    rail: () => ls.get(KEY_RAIL, "expanded"),
    setRail: (v) => { ls.set(KEY_RAIL, v); apply(); window.dispatchEvent(new CustomEvent("prefs:change", { detail: { rail: v } })); },
    toggleRail: () => Prefs.setRail(Prefs.rail() === "collapsed" ? "expanded" : "collapsed"),

    apply,
  };

  // Apply on load so the first paint already has the right theme.
  if (typeof document !== "undefined") {
    if (document.readyState !== "loading") apply();
    else document.addEventListener("DOMContentLoaded", apply);
  }

  if (typeof window !== "undefined") window.Prefs = Prefs;
})();
</script>

<script>/* Obara Ops backend client.
 * Drop-in replacement for the in-browser localStorage shim.
 * Falls back to localStorage when no backend URL is configured. */

(function (global) {
  const CFG_KEY = "obara:backend_config";
  const SESSION_KEY = "obara:backend_session";

  const readConfig = () => {
    try { return JSON.parse(localStorage.getItem(CFG_KEY) || "{}"); }
    catch (_) { return {}; }
  };
  const writeConfig = (cfg) => localStorage.setItem(CFG_KEY, JSON.stringify(cfg || {}));
  const clearConfig = () => localStorage.removeItem(CFG_KEY);

  const readSession = () => {
    try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); }
    catch (_) { return null; }
  };
  const writeSession = (session) => localStorage.setItem(SESSION_KEY, JSON.stringify(session || null));
  const clearSession = () => localStorage.removeItem(SESSION_KEY);

  const buildHeaders = (cfg, session, extra) => {
    const headers = Object.assign({}, extra || {});
    headers["Content-Type"] = "application/json";
    if (session && session.access_token) headers["Authorization"] = "Bearer " + session.access_token;
    if (cfg.tenantId) headers["x-obara-tenant"] = cfg.tenantId;
    return headers;
  };

  const handleResponse = async (resp) => {
    const text = await resp.text();
    let body = null;
    if (text) {
      try { body = JSON.parse(text); }
      catch (_) { body = { raw: text }; }
    }
    if (!resp.ok) {
      const message = (body && body.error && body.error.message) || ("HTTP " + resp.status);
      const err = new Error(message);
      err.status = resp.status;
      err.body = body;
      throw err;
    }
    return body || {};
  };

  const apiFetch = async (path, init) => {
    const cfg = readConfig();
    if (!cfg.url) throw new Error("Backend URL not configured");
    const session = readSession();
    const fullUrl = cfg.url.replace(/\/+$/, "") + path;
    const opts = init || {};
    const resp = await fetch(fullUrl, {
      method: opts.method || "GET",
      headers: buildHeaders(cfg, session, opts.headers),
      body: opts.body && typeof opts.body !== "string" ? JSON.stringify(opts.body) : opts.body,
    });
    return handleResponse(resp);
  };

    deleteCustomerLocation: async (id) => apiFetch("/api/admin/customer_locations?id=" + encodeURIComponent(id), { method: "DELETE" }),
    listEquipment: async (params) => apiFetch("/api/admin/equipment" + (params ? "?" + new URLSearchParams(params).toString() : "")),
    upsertEquipment: async (payload) => apiFetch("/api/admin/equipment", { method: "POST", body: payload }),
    deleteEquipment: async (id) => apiFetch("/api/admin/equipment?id=" + encodeURIComponent(id), { method: "DELETE" }),
    listLostReasons: async () => apiFetch("/api/admin/lost_reasons"),
    upsertLostReason: async (payload) => apiFetch("/api/admin/lost_reasons", { method: "POST", body: payload }),
    deleteLostReason: async (id) => apiFetch("/api/admin/lost_reasons?id=" + encodeURIComponent(id), { method: "DELETE" }),
    listApprovalThresholds: async () => apiFetch("/api/admin/quote_approvals?type=thresholds"),
    upsertApprovalThreshold: async (payload) => apiFetch("/api/admin/quote_approvals?type=thresholds", { method: "POST", body: payload }),
    deleteApprovalThreshold: async (id) => apiFetch("/api/admin/quote_approvals?type=thresholds&id=" + encodeURIComponent(id), { method: "DELETE" }),
    listApprovalRequests: async (order_id) => apiFetch("/api/admin/quote_approvals?type=approvals" + (order_id ? "&order_id=" + encodeURIComponent(order_id) : "")),
    decideApprovalRequest: async (payload) => apiFetch("/api/admin/quote_approvals?type=approvals", { method: "POST", body: payload }),
  };

  const email = {
    /* Provider configuration is documented in backend/README.md.
       This client method is for replaying captured emails into the same intake pipeline,
       useful for testing and migration. */
    submit: async (envelope) => apiFetch("/api/email/inbound", { method: "POST", body: envelope }),
  };

  /* The legacy SO agent uses window.storage.{get,set,delete,list}.
     When backend mode is enabled, we proxy specific keys to the relevant API. */

  const KEY_TO_RESOURCE = {
    "so_agent:orders": "orders",
    "so_agent:customer_formats": "customer_formats",
    "so_agent:result_cache": "extraction_cache",
    "so_agent:audit_log": "audit",
    "so_agent:customer_budgets": "budgets",
    "so_agent:learned_rules": "learned_rules",
  };

  const localStorageStorage = {
    get: async (k) => {
      const v = localStorage.getItem(k);
      return v ? { key: k, value: v } : null;
    },
    set: async (k, v) => {
      localStorage.setItem(k, v);
      return { key: k, value: v };
    },
    delete: async (k) => {
      localStorage.removeItem(k);
      return { key: k, deleted: true };
    },
    list: async (prefix) => ({
      keys: Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix)),
    }),
  };

  const buildHybridStorage = () => {
    const local = localStorageStorage;
    return {
      get: async (k) => {
        if (!isReady()) return local.get(k);
        const resource = KEY_TO_RESOURCE[k];
        if (!resource) return local.get(k);
        try {
          if (resource === "orders") {
            const { orders } = await api.orders.list({ limit: 200 });
            return { key: k, value: JSON.stringify(orders || []) };
          }
          if (resource === "customer_formats") {
            const { customers, profiles } = await api.customers.list();
            const map = {};
            (customers || []).forEach((c) => {
              const profile = profiles && profiles[c.id];
              map[c.customer_key] = {
                customerKey: c.customer_key,
                customerName: c.customer_name,
                customerGSTIN: c.gstin || "",
                firstSeen: c.created_at,
                lastUpdated: c.updated_at,
                ordersProcessed: profile ? profile.orders_processed : 0,
                lastFormatChanged: profile ? profile.last_format_changed : false,
                formatChangeSummary: profile ? profile.format_change_summary : "",
                fingerprint: profile ? profile.fingerprint : {},
                trusted: profile ? profile.trusted : false,
                learnedRules: profile ? profile.learned_rules : {},
              };
            });
            return { key: k, value: JSON.stringify(map) };
          }
          if (resource === "audit") {
            const { events } = await api.audit.list({ limit: 200 });
            const mapped = (events || []).map((e) => ({ at: e.created_at, action: e.action, detail: e.detail || "", refId: e.object_id }));
            return { key: k, value: JSON.stringify(mapped) };
          }
        } catch (err) {
          if (typeof console !== "undefined") console.warn("[obara-client] backend get failed for " + k + ":", err.message);
        }
        return local.get(k);
      },
      set: async (k, v) => {
        if (!isReady()) return local.set(k, v);
        const resource = KEY_TO_RESOURCE[k];
        if (!resource) return local.set(k, v);
        try {
          if (resource === "audit") {
            const log = JSON.parse(v || "[]");
            const latest = (log[0] && log[0].at) || null;
            const knownLatest = await local.get(k + ":last_at");
            if (!latest || (knownLatest && knownLatest.value === latest)) return local.set(k, v);
            const newest = log.filter((entry) => !knownLatest || entry.at > knownLatest.value).slice(0, 100);
            for (const entry of newest) {
              await api.audit.record({ action: entry.action, objectType: "user_action", objectId: entry.refId || null, detail: entry.detail || "" });
            }
            await local.set(k + ":last_at", latest);
            return local.set(k, v);
          }
          if (resource === "orders") {
            const orders = JSON.parse(v || "[]");
            const latest = orders[0];
            if (!latest || !latest.id) return local.set(k, v);
            const known = await local.get(k + ":synced");
            const synced = known && known.value ? JSON.parse(known.value) : {};
            if (!synced[latest.id]) {
              try {
                await api.orders.create({
                  status: latest.status,
                  po_number: latest.preflightPONumber,
                  doc_fingerprint: latest.docFingerprint,
                  result: latest.result,
                  api_usage: latest.apiUsage || {},
                  cost_policy_snapshot: latest.costPolicySnapshot || {},
                  token_estimate: latest.tokenEstimate || {},
                  rule_findings: latest.ruleFindings || [],
                  anomaly_flags: latest.anomalyFlags || [],
                  evidence_by_field: latest.evidenceByField || {},
                  line_edits: latest.lineEdits || [],
                  approval: latest.approval || null,
                  payload_hash: (latest.approval && latest.approval.payloadHash) || null,
                  blocker_summary: latest.blockerSummary || null,
                  format_change_summary: latest.formatChangeSummary || null,
                  cost_avoided_reason: latest.costAvoidedReason || null,
                });
                synced[latest.id] = new Date().toISOString();
                await local.set(k + ":synced", JSON.stringify(synced));
              } catch (err) {
                if (typeof console !== "undefined") console.warn("[obara-client] order push failed:", err.message);
              }
            }
            return local.set(k, v);
          }
        } catch (err) {
          if (typeof console !== "undefined") console.warn("[obara-client] backend set failed for " + k + ":", err.message);
        }
        return local.set(k, v);
      },
      delete: async (k) => local.delete(k),
      list: async (prefix) => local.list(prefix),
    };
  };

  const api = {
    isReady,
    setConfig,
    getConfig: readConfig,
    setSession,
    getSession: readSession,
    ping,
    claudeCall,
    documents,
    orders,
    customers,
    aliases,
    audit,
    tally: tallyExt,
    events,
    findings,
    duplicates,
    anomaly,
    eval: evalExt,
    email,
    auth: authMethods,
    ocr,
    scan,
    fx,
    delivery,
    inventory,
    masterData,
    bom,
    profileVersions,
    sourcePos,
    communications,
    cost,
    salesHistory,
    security,
    spareMatrix,
    admin,
    sales,
    service,
    einvoice,
    forecast,
    scheduleLines,
  };

  global.ObaraBackend = api;
  global.storage = buildHybridStorage();
})(typeof window !== "undefined" ? window : globalThis);
</script>

<!-- Mark a flag so legacy code can detect we're in v3 mode -->
<script>
window.ANVIL_V3 = true;
// Escape hatch: ?v3=0 unpins v3 and goes back to /. The pin survives across
// reloads via localStorage["obara:v3_pinned"]; index.html honors it.
(function(){
  try {
    var qs = new URLSearchParams(window.location.search);
    if (qs.get("v3") === "0") {
      localStorage.removeItem("obara:v3_pinned");
      window.location.replace("/");
    }
  } catch (_) {}
})();
</script>

const { useState: useStateW, useEffect: useEffectW, useMemo: useMemoW } = React;

// ─────────────────────────────────────────────────────────────
// useFetch: tiny hook that runs a thunk on mount, exposes
// { data, error, loading, reload }. Avoids pulling in a state library.
// ─────────────────────────────────────────────────────────────
const useFetch = (thunk, deps = []) => {
  const [state, setState] = useStateW({ data: null, error: null, loading: true });
  const [bump, setBump] = useStateW(0);
  useEffectW(() => {
    let cancelled = false;
    setState((s) => ({ ...s, loading: true }));
    Promise.resolve()
      .then(() => thunk())
      .then((data) => { if (!cancelled) setState({ data, error: null, loading: false }); })
      .catch((error) => { if (!cancelled) setState({ data: null, error, loading: false }); });
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [...deps, bump]);
  return { ...state, reload: () => setBump((n) => n + 1) };
};

// Format a relative age like "14m" / "2h" / "1d 3h"
const ageLabel = (iso) => {
  if (!iso) return "—";
  const ms = Date.now() - new Date(iso).getTime();
  if (Number.isNaN(ms)) return "—";
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h`;
  const days = Math.floor(hrs / 24);
  const remH = hrs - days * 24;
  return remH ? `${days}d ${remH}h` : `${days}d`;
};

const fmtINRShort = (n) => {
  if (n == null) return "—";
  if (n >= 10_00_000) return `₹ ${(n / 1_00_000).toFixed(1)} L`;
  if (n >= 1000) return `₹ ${(n / 1000).toFixed(0)}k`;
  return `₹ ${n.toLocaleString("en-IN")}`;
};

const stageOf = (status) => {
  // Map order_status enum to a v3 chip
  const map = {
    DRAFT: { label: "intake", k: "info" },
    PENDING_REVIEW: { label: "validate", k: "warn" },
    APPROVED: { label: "approval", k: "good" },
    BLOCKED: { label: "blocked", k: "bad" },
    DUPLICATE: { label: "duplicate", k: "warn" },
    REUSED: { label: "reused", k: "info" },
    EXPORTED_TO_TALLY: { label: "tally", k: "info" },
    FAILED_TALLY_IMPORT: { label: "tally fail", k: "bad" },
    RECONCILED: { label: "shipped", k: "good" },
    CANCELLED: { label: "cancelled", k: "ghost" },
  };
  return map[status] || { label: (status || "draft").toLowerCase(), k: "ghost" };
};

const sevOf = (order) => {
  const s = order?.status;
  if (s === "BLOCKED" || s === "FAILED_TALLY_IMPORT") return "high";
  if (s === "PENDING_REVIEW" || s === "DUPLICATE") return "med";
  return "low";
};

  <script type="text/babel" data-presets="env,react">// ============================================================
// ANVIL v3 — App router
// Mounts the v3 Shell + a route switch keyed on nav id.
// Reads role from RBAC and filters the sidebar accordingly.
// ============================================================

const { useState, useEffect, useMemo, useCallback, useRef } = React;

const ROUTE_KEY = "obara:v3_route";

// Map nav id → React component. Each component is a Window-exposed render
// function from the screens-*.jsx files we copied alongside.
const ROUTES = {
  // Workflows
  home:        () => <HomeRoute />,
  intake:      () => (window.Inbox ? <Inbox /> : <Placeholder name="Inbox" />),
  so:          () => (window.SOList ? <SOList /> : <Placeholder name="Sales Orders" />),
  internal:    () => (window.InternalSOs ? <InternalSOs /> : <Placeholder name="Internal SOs" />),
  approvals:   () => (window.Approvals ? <Approvals /> : <Placeholder name="Approvals" />),
  // Sales
  leads:       () => (window.Leads ? <Leads /> : <Placeholder name="Leads" />),
  opps:        () => (window.Opportunities ? <Opportunities /> : <Placeholder name="Opportunities" />),
  projects:    () => (window.Projects ? <Projects /> : <Placeholder name="Projects" />),
  shipments:   () => (window.Shipments ? <Shipments /> : <Placeholder name="Shipments" />),
  // Procurement
  spo:         () => (window.SPOList ? <SPOList /> : (window.SourcePOs ? <SourcePOs /> : <Placeholder name="Source POs" />)),
  spares:      () => (window.SparesMatrix ? <SparesMatrix /> : <Placeholder name="Spares Matrix" />),
  // Service
  "svc-visits":() => (window.ServiceVisits ? <ServiceVisits /> : <Placeholder name="Service Visits" />),
  amc:         () => (window.AMCSchedule ? <AMCSchedule /> : <Placeholder name="AMC Schedule" />),
  car:         () => (window.CARReports ? <CARReports /> : <Placeholder name="CAR Reports" />),
  // Finance
  tally:       () => (window.TallyPush ? <TallyPush /> : <Placeholder name="Tally Sync" />),
  einvoice:    () => (window.EInvoice ? <EInvoice /> : <Placeholder name="e-Invoice" />),
  cost:        () => (window.CostMargin ? <CostMargin /> : <Placeholder name="Cost & Margin" />),
  // Data
  customers:   () => (window.Customers ? <Customers /> : <Placeholder name="Customers" />),
  items:       () => (window.Items ? <Items /> : <Placeholder name="Item Master" />),
  graph:       () => (window.MasterDataGraph ? <MasterDataGraph /> : <Placeholder name="Master Data Graph" />),
  forecasts:   () => (window.Forecasts ? <Forecasts /> : <Placeholder name="Forecasts" />),
  // Quality
  evals:       () => (window.EvalSuites ? <EvalSuites /> : <Placeholder name="Eval Suites" />),
  studio:      () => (window.ProfileStudio ? <ProfileStudio /> : <Placeholder name="Profile Studio" />),
  anomaly:     () => (window.Findings ? <Findings /> : <Placeholder name="Anomaly" />),
  duplicates:  () => (window.Duplicates ? <Duplicates /> : <Placeholder name="Duplicates" />),
  // Comms & Security
  comms:       () => (window.Communications ? <Communications /> : <Placeholder name="Communications" />),
  email:       () => (window.EmailTriage ? <EmailTriage /> : <Placeholder name="Email Triage" />),
  security:    () => (window.Security ? <Security /> : <Placeholder name="Security Center" />),
  // Admin
  audit:       () => (window.AuditLog ? <AuditLog /> : <Placeholder name="Audit Log" />),
  admin:       () => (window.AdminCenter ? <AdminCenter /> : <Placeholder name="Admin Center" />),
};

const Placeholder = ({ name }) => (
  <div className="ws ws-no-rail" style={{ padding: 22 }}>
    <WSTitle eyebrow="Coming soon" title={name} meta="this route is wired but the screen has not yet been imported" />
    <div className="ws-content">
      <Card>
        <div className="body">
          This nav id resolves to a screen module that has not been registered yet.
          Implementation continues in Phase 3 of the v3 overhaul. In the meantime
          the underlying API + table for this route already work via the legacy
          shell (see <code>?v3=0</code>).
        </div>
      </Card>
    </div>
  </div>
);

// HomeRoute picks a role-appropriate home.
const HomeRoute = () => {
  const role = window.RBAC?.role() || "sales_engineer";
  if (role === "sales_manager" && window.HomeManager) return <HomeManager />;
  if (role === "admin" && window.HomeAdmin) return <HomeAdmin />;
  if (window.HomeEngineer) return <HomeEngineer />;
  return <Placeholder name="My Day" />;
};

// Build a breadcrumb from the active route id.
const crumbFor = (navId) => {
  const groups = (window.NAV || []).find((g) => g.items.some((i) => i.id === navId));
  const item = groups?.items.find((i) => i.id === navId);
  return groups && item ? ["Anvil", groups.label, item.label] : ["Anvil"];
};

// Forced rerender on RBAC + Prefs change so the Shell + filtered NAV
// reflect the new state.
const useRerenderOnEvents = (eventNames) => {
  const [, force] = useState(0);
  useEffect(() => {
    const bump = () => force((n) => n + 1);
    eventNames.forEach((e) => window.addEventListener(e, bump));
    return () => eventNames.forEach((e) => window.removeEventListener(e, bump));
  }, [eventNames.join("|")]);
};

const App = () => {
  useRerenderOnEvents(["rbac:change", "prefs:change", "popstate"]);

  // Route state: read from URL hash if present, otherwise localStorage,
  // default to home. Role + tenant pop-overs hidden for now (Phase 4).
  const [route, setRoute] = useState(() => {
    const hash = (window.location.hash || "").replace(/^#\/?/, "");
    if (hash && ROUTES[hash]) return hash;
    try { return localStorage.getItem(ROUTE_KEY) || "home"; } catch { return "home"; }
  });

  const onRoute = useCallback((id) => {
    if (!ROUTES[id]) return;
    if (window.RBAC && !window.RBAC.canRead(id)) {
      console.warn(`[v3] role ${window.RBAC.role()} cannot access ${id}`);
      return;
    }
    setRoute(id);
    try { localStorage.setItem(ROUTE_KEY, id); } catch (_) {}
    try { window.history.replaceState(null, "", `#/${id}`); } catch (_) {}
  }, []);

  // Cmd+K + Thread overlays
  const [cmdkOpen, setCmdk] = useState(false);
  const [threadOpen, setThread] = useState(false);

  // Keyboard shortcut: Cmd+K / Ctrl+K opens the palette
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        setCmdk((v) => !v);
      }
      if (e.key === "Escape") {
        setCmdk(false);
        setThread(false);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // Build a role-filtered NAV
  const NAV_FILTERED = useMemo(() => {
    if (!window.RBAC || !window.NAV) return window.NAV || [];
    return window.RBAC.filterNav(window.NAV);
  }, [window.RBAC?.role(), window.NAV]);

  // If the current route is no longer accessible (role change), bounce to home
  useEffect(() => {
    if (!window.RBAC) return;
    if (!window.RBAC.canRead(route)) onRoute("home");
  }, [route, onRoute]);

  const role = window.RBAC?.role() || "sales_engineer";
  const roleObj = (window.ROLES || []).find((r) => r.id === role.split("_")[0]) ||
                  { id: role, label: role.replace(/_/g, " "), short: role.slice(0, 3).toUpperCase() };

  const Active = ROUTES[route] || (() => <Placeholder name="Unknown route" />);

  return (
    <>
      <ShellInner
        route={route}
        onRoute={onRoute}
        navFiltered={NAV_FILTERED}
        role={roleObj}
        onRoleChange={() => setCmdk(false) || promptRole()}
        onCmdK={() => setCmdk(true)}
        onThread={() => setThread(true)}
        crumb={crumbFor(route)}
      >
        <Active />
      </ShellInner>
      {window.CmdK && <CmdK open={cmdkOpen} onClose={() => setCmdk(false)} onJump={(id) => { onRoute(id); setCmdk(false); }} />}
      {window.ThreadDrawer && <ThreadDrawer open={threadOpen} onClose={() => setThread(false)} />}
    </>
  );
};

// Tiny role-picker that reuses the head-pill drop. Phase 4 replaces this
// with a proper dropdown panel anchored to the role pill.
function promptRole() {
  const roles = (window.RBAC?.ROLES) || [];
  const cur = window.RBAC?.role();
  const list = roles.map((r, i) => `${i + 1}. ${r}${r === cur ? " (current)" : ""}`).join("\n");
  const pick = window.prompt(`Switch role to:\n${list}\n\nEnter 1-${roles.length}:`);
  const n = parseInt(pick, 10);
  if (!isNaN(n) && n >= 1 && n <= roles.length) window.RBAC.setRole(roles[n - 1]);
}

// Wrap the design-system Shell with theme + density + tenant pills.
// We don't modify shell.jsx itself so future v3 design-system updates can
// drop in cleanly; this is a thin adapter layer.
const ShellInner = ({ children, route, onRoute, navFiltered, role, onRoleChange, onCmdK, onThread, crumb }) => {
  const tenant = { code: localStorage.getItem("obara:v3_tenant_code") || "OBARA-IN" };
  return (
    <Shell
      route={route}
      onRoute={onRoute}
      role={role}
      onRole={onRoleChange}
      tenant={tenant}
      onTenant={() => alert("Tenant switching requires admin role. See Admin Center.")}
      onCmdK={onCmdK}
      onThread={onThread}
      crumb={crumb}
      nav={navFiltered}
    >
      <ThemeBar />
      {children}
    </Shell>
  );
};

// Floating bar in the dock area: theme toggle + density + rail collapse.
const ThemeBar = () => {
  const [, force] = useState(0);
  useEffect(() => {
    const onChange = () => force((n) => n + 1);
    window.addEventListener("prefs:change", onChange);
    return () => window.removeEventListener("prefs:change", onChange);
  }, []);
  const theme = window.Prefs?.theme() || "dark";
  const density = window.Prefs?.density() || "normal";
  return (
    <div style={{ position: "fixed", right: 16, bottom: 36, display: "flex", gap: 6, zIndex: 100 }}>
      <button className="head-pill" title="Toggle theme" onClick={() => window.Prefs.toggleTheme()}>
        {theme === "dark" ? Icon.eye : Icon.eye} {theme}
      </button>
      <button className="head-pill" title="Cycle density" onClick={() => {
        const order = ["compact", "normal", "comfortable"];
        const next = order[(order.indexOf(density) + 1) % order.length];
        window.Prefs.setDensity(next);
      }}>{Icon.layers} {density}</button>
      <button className="head-pill" title="Toggle sidebar" onClick={() => window.Prefs.toggleRail()}>
        {Icon.arrowL}
      </button>
    </div>
  );
};

// Mount when this file loads; the host HTML provides the #v3-root div.
window.AnvilV3 = { App };
const root = document.getElementById("v3-root");
if (root && typeof ReactDOM !== "undefined") {
  if (ReactDOM.createRoot) ReactDOM.createRoot(root).render(<App />);
  else ReactDOM.render(<App />, root);
}
</script>

    </div>
